<!-- Custom data processing functions -->
<script id="ly-library">
    helpers = {
        GetMonth: (historyObject) => {
            d = new Date(historyObject.date[0].seconds*1000)
            return (1900 + d.getYear()) + (""+(d.getMonth()+1)).padStart(2,'0')
        },
        GetTitle: (historyKey, historyObject) => {
            return historyKey.slice(-2) + historyObject.element
        },
        GetIndex: (raid) => {
            // takes the raid KEY so it can read the event number from it
            historyObject = historicalData[raid]
            num = +raid.replace(/\D/g, '')
            if (raid == "teamraid058") {
                // teamraid058 ran an irregular 6-day schedule with NO interval day
                // (continuous data 09-09..09-15). Keyed by raid id now that date[0]
                // is the true prelim start (the old ==epoch check would break).
                rt = [
                    [-1, "Pre"],
                    [1, "Day1"],
                    [2, "Day2"],
                    [3, "Day3"],
                    [4, "Day4"]
                ]
            } else {
                rt = [
                    [-1, "Pre"],
                    [0, "Interval"],
                    [1, "Day1"],
                    [2, "Day2"],
                    [3, "Day3"],
                    [4, "Day4"]
                ]
            }
            // Finals ran 5 days only through event 39; the 4-day format began at
            // teamraid040 (第40回, Aug 2018). The old duration check (date[1]-date[0]
            // == 7d) was unreliable - configs/history date[] are hand-entered by
            // convention, so it both missed and false-positived 5-day events.
            if (num <= 39) rt.push([5, "Day5"])
            return rt
        },
        GetDate: (historyObject, day) => {
            dStart = new Date(historyObject.date[0].seconds*1000)
            if (day == -1)
                return dStart.toLyDate()
            else {
                dStart.setDate(dStart.getDate() + 2 + day)
                return dStart.toLyDate()
            }
        },
        LoadCrewSearchGraph: (raid) => {
            // stop listening for personal_border updates while in crew search
            if (unsubscribePBorder != null) { unsubscribePBorder(); unsubscribePBorder = null; }
            $('.pborder').hide();
            $('.crewsearch').show();
            // Resolve which raid+day to show by default. Only the newest raid
            // honours the "derive today" rule (interval/pre -> previous event's
            // day4); older raids clicked explicitly just show their day4.
            var rd = (raid === newestRaid) ? CrewDefaultRaidDay() : [raid, 4];
            ShowCrewSearch(rd[0], rd[1]);
        },
        LoadPersonalBorderGraph: (raid, day) => {
            // thin entry point (sidebar + landing). The per-raid doc listener is
            // attached once by ShowPersonalBorder; switching days is local, so
            // PB day->day no longer re-reads the document (see graph-render).
            // Leaving the crew view: drop the /crew?... deep-link from the URL.
            if (/\/crew/.test(location.pathname)) history.replaceState(null, '', '/');
            ShowPersonalBorder(raid, day == null ? PBDefaultDay(raid) : day);
        },

    }
    Date.prototype.addDays = function (days) {
        return new Date(this.valueOf() + days * 86400e3);
    }
    Date.prototype.addHours = function (days) {
        return new Date(this.valueOf() + days * 3600e3);
    }
    Date.prototype.addMinutes = function (days) {
        return new Date(this.valueOf() + days * 60e3);
    }
    Date.prototype.toLyDate = function () {
        return (""+this.getYear()).slice(-2) + (""+(this.getMonth()+1)).padStart(2,'0') + (""+(this.getDate()+1)).padStart(2,'0')
    }
    Date.prototype.toLyTime = function () {
        return (""+this.getHours()).padStart(2,'0') + (""+this.getMinutes()).padStart(2,'0') + (""+this.getSeconds()).padStart(2,'0')
    }
    Date.prototype.toLyDatetime = function() {
        return this.toLyDate() + this.toLyTime()
    }
    Date.prototype.between = function(startDate, endDate) {
        return (startDate <= this) && (this <= endDate)
    }
    Date.prototype.floorTo20m = function () {
        // game data points sit on :00/:20/:40 JST exactly, but configs/history
        // date[0] is hand-written with arbitrary min/sec offsets - snap to grid
        return new Date(this.valueOf() - this.valueOf() % 1200e3);
    }
    Date.prototype.toJstHM = function () {
        // display always in Japan time regardless of viewer timezone
        return this.toLocaleTimeString('en-GB', {timeZone: 'Asia/Tokyo', hour12: false, hour: '2-digit', minute: '2-digit'});
    }
    function jstMidnight(d){
        // floor an instant to 00:00 JST of its Japan-calendar day. date[0] is now
        // the true prelim start (19:00 JST); recovering midnight keeps every day
        // window offset identical to the old (midnight-anchored) convention.
        var t = d.getTime() + 9*3600e3;
        t -= t % 86400e3;
        return new Date(t - 9*3600e3);
    }
    function GetDateTimeInRaid(raid, date){
        key = raid
        raidStartDate = jstMidnight(new Date(historicalData[key].date[0].seconds*1000))
        // ends are the true day boundary (24:00 / next-day 07:00) so the
        // day-final datapoint gets its own slot; both ends snapped to the 20m grid
        switch(date){
            case -1:
                start = raidStartDate.addHours(19)
                end = raidStartDate.addDays(2)
                return [start.floorTo20m(), end.floorTo20m()]
            case 0:
                start = raidStartDate.addDays(2).addHours(7)
                end = raidStartDate.addDays(3).addHours(7)
                return [start.floorTo20m(), end.floorTo20m()]
            case 1:
            case 2:
            case 3:
            case 4:
            case 5:
                if (key == "teamraid058") {
                    start = raidStartDate.addDays(1 + date).addHours(7)
                    end = raidStartDate.addDays(1 + date).addHours(24)
                } else {
                    start = raidStartDate.addDays(2 + date).addHours(7)
                    end = raidStartDate.addDays(2 + date).addHours(24)
                }
                return [start.floorTo20m(), end.floorTo20m()]
            default:
                return "bad"
        }
    }
    function CreateTimeframe(raid, day){
        startend = GetDateTimeInRaid(raid, day)
        current = startend[0]
        rt = []
        // <= so the day-end boundary (24:00) is included as the last slot
        for (current = startend[0]; current <= startend[1]; current = current.addMinutes(20)) {
            rt.push(current)
        }
        return rt
    }
    function transpose(a) {
        var w = a.length || 0;
        var h = a[0] instanceof Array ? a[0].length : 0;
        if(h === 0 || w === 0) { return []; }
        var i, j, t = [];
        for(i=0; i<h; i++) {
            t[i] = [];
            for(j=0; j<w; j++) {
                t[i][j] = a[j][i] == "" ? null : a[j][i];
            }
        }
        return t;
    }
</script>

<!-- Chart.js Settings -->
<script id="graph-render">
var pborderdata, pborderdatadiff, crewdatadiff;
var unsubscribePBorder = null;
var colors=['rgb(255,99,132)','rgb(255,159,64)','rgb(255,205,86)','rgb(75,192,192)','rgb(102,204,0)','rgb(127,0,255)'];
function GraphConfig(title, datalabel, datasets){
    return {
        type: 'line',
        data: {
            labels: datalabel,
            datasets: datasets
        },
        options: {
            interaction: {
                intersect: false,
                mode: 'index',
            },
            plugins: {
                title: {
                    display: true,
                    text: title
                },
            },
        }
    };
}

// ==== Personal border (per-raid doc, local day switching, realtime) ====
// pbState caches the raid's whole records array; a "day" is just a slice, so
// switching days re-renders locally with NO document re-read. The onSnapshot
// listener is (re)attached only when the raid changes or after we detached on
// nav to crew search.
var pbState = { raid: null, day: null, records: null };

// Default day when entering a raid's PB view from the sidebar: its last day
// (Day4, or Day5 for the pre-teamraid040 events). Reuses GetIndex so the
// event-number rule / special schedules stay authoritative.
function PBDefaultDay(raid) {
    var days = helpers.GetIndex(raid);
    return days[days.length - 1][0];
}

// Build the day-switcher buttons for a raid from GetIndex (Pre/Interval/Day1-4
// [+Day5 <=teamraid039]). data-day drives the active highlight.
function BuildPBDayButtons(raid) {
    var html = helpers.GetIndex(raid).map((d)=>
        '<button type="button" class="btn btn-outline-primary" data-day="' + d[0] + '" onclick="SelectPBDay(' + d[0] + ')">' + d[1] + '</button>'
    ).join('');
    $('#pbdays').html(html);
}

// Switch into PB view for a raid+day. Re-attaches the listener only when the
// raid actually changed (or we left to crew and detached); day-only changes
// fall through to SelectPBDay, which is local.
function ShowPersonalBorder(raid, day) {
    if (unsubscribeCrew.length) { unsubscribeCrew.forEach((u)=>u()); unsubscribeCrew = []; }
    $('.pborder').show();
    $('.crewsearch').hide();
    var raidChanged = (raid !== pbState.raid);
    if (raidChanged) {
        pbState.raid = raid;
        pbState.records = null;
        // new raid => drop the old charts so RenderPB rebuilds cleanly
        if (pborderdata != null) { pborderdata.destroy(); pborderdata = null; }
        if (pborderdatadiff != null) { pborderdatadiff.destroy(); pborderdatadiff = null; }
        BuildPBDayButtons(raid);
    }
    if (raidChanged || unsubscribePBorder == null) AttachPBListener();
    SelectPBDay(day);
}

// Local day switch: set the day, highlight its button, re-render from the
// already-cached records. Zero reads.
function SelectPBDay(day) {
    pbState.day = day;
    $('#pbdays button').removeClass('active');
    $('#pbdays button[data-day="' + day + '"]').addClass('active');
    RenderPB();
}

// Attach the per-raid realtime listener; each snapshot refreshes the cache and
// re-renders the current day.
function AttachPBListener() {
    if (unsubscribePBorder != null) unsubscribePBorder();
    unsubscribePBorder = db.collection('personal_border').doc(pbState.raid).onSnapshot((doc)=>{
        if (!doc.exists || doc.data()['records'] == null) return;
        pbState.records = doc.data()['records'];
        console.log('personal_border snapshot:', pbState.raid, pbState.records.length, 'records', new Date().toISOString());
        RenderPB();
    }, (err)=>console.error('personal_border listener error:', err));
}

// Render the current (raid, day) slice: bucket records onto the day's 20-min
// grid, then draw the absolute + 20m-speed charts. Rebuilds on raid change
// (charts nulled), otherwise swaps data in place so legend toggles survive.
function RenderPB() {
    if (pbState.records == null) return;
    var raid = pbState.raid, day = pbState.day;
    var dataset_amt = historicalData[raid].border.length;
    var data = pbState.records.reduce((t,e)=>{
        var thisDateTime = new Date(e.datetime.seconds*1000);
        return t.map((v)=>{
            if (thisDateTime.between(v[0], v[0].addMinutes(20))) {
                return [v[0]].concat(historicalData[raid].border.map((b)=>e[b]));
            } else return v;
        });
    }, CreateTimeframe(raid, day).map((e)=>[e].concat(Array.from({length:dataset_amt}))));
    var datat = transpose(data);
    var dataLabel = datat[0].map((e,i,a)=>(i == a.length-1 && e.toJstHM() == '00:00') ? '24:00' : e.toJstHM());
    var dataSet = [], dataSetDiff = [];
    for (var i=0; i<dataset_amt; i++) {
        if (datat[i+1] == null) continue;
        var display = historicalData[raid].border[i] >= 10000;
        dataSet.push({
            label: historicalData[raid].border[i],
            backgroundColor: colors[i], borderColor: colors[i],
            data: datat[i+1], fill: false, hidden: !display
        });
        dataSetDiff.push({
            label: historicalData[raid].border[i],
            backgroundColor: colors[i], borderColor: colors[i],
            data: datat[i+1].map((v,j,a)=>(a[j]==null||a[j-1]==null) ? null : a[j]-a[j-1]),
            fill: false, hidden: !display
        });
    }
    var t1 = raid + " day " + day + " personal border";
    var t2 = raid + " day " + day + " personal border 20m speed";
    if (pborderdata == null) {
        pborderdata = new Chart($('#pborderdata')[0].getContext('2d'), GraphConfig(t1, dataLabel, dataSet));
        pborderdatadiff = new Chart($('#pborderdatadiff')[0].getContext('2d'), GraphConfig(t2, dataLabel, dataSetDiff));
    } else {
        pborderdata.data.labels = dataLabel;
        dataSet.forEach((d,i)=>{ pborderdata.data.datasets[i].data = d.data; });
        pborderdata.options.plugins.title.text = t1;
        pborderdata.update('none');
        pborderdatadiff.data.labels = dataLabel;
        dataSetDiff.forEach((d,i)=>{ pborderdatadiff.data.datasets[i].data = d.data; });
        pborderdatadiff.options.plugins.title.text = t2;
        pborderdatadiff.update('none');
    }
}

// ==== Crew search (id-or-name, per-day, up to 2 crews, realtime) ====
// crewState holds everything the render needs; listeners fill in .records live,
// SelectDay swaps which day is drawn from those same cached records (no refetch).
// slotMatches[slot] caches the {id,name} candidates a slot's input resolved to
// (>1 when a name matches several crews) so the dropdown can switch without a
// re-query.
var crewState = { raid: null, day: null, crews: [] };
var unsubscribeCrew = [];
var slotMatches = { A: [], B: [] };

// Resolve the default (raid, day) for the crew page, mirroring the landing
// page's day derivation but constrained to fighting days (1-4). If the newest
// raid hasn't reached day1 yet (pre/interval), fall back to the PREVIOUS
// event's day4 - that's the last real fighting day. If it's mid/post event,
// use the current/most-recent fighting day.
function CrewDefaultRaidDay() {
    var pos = Array.from({length:6},(x,i)=>[4-i, GetDateTimeInRaid(newestRaid,4-i)[0]])
                   .find((e)=>(e[1] < new Date()));
    if (pos && pos[0] >= 1) return [newestRaid, pos[0]];
    // before day1 of the newest raid (or newest raid entirely in the future)
    var keys = Object.keys(historicalData); // newest-first
    var prev = keys[keys.indexOf(newestRaid) + 1];
    return prev ? [prev, 4] : [newestRaid, 4];
}

// Switch into the crew view for a given raid+day, then resolve the inputs and
// (re)attach listeners against the new raid.
function ShowCrewSearch(raid, day) {
    crewState.raid = raid;
    crewState.day = day;
    $('#crewraidlabel').text('(' + raid + ')');
    $('#crewdays button').removeClass('active').eq(day - 1).addClass('active');
    SubmitCrew();
}

// Called by the form submit: resolve both inputs (id or name -> {id,name}
// candidates), then rebuild the crew list and re-attach listeners.
function SubmitCrew() {
    Promise.all([ResolveSlot('A'), ResolveSlot('B')]).then(ReloadCrews);
}

// Resolve one input slot to a list of {id,name} candidates and populate its
// dropdown. A numeric value is taken as an id (name fetched for the legend);
// text is treated as a crew name and may match several crews.
function ResolveSlot(slot) {
    var val = String($('#crew' + slot).val() || '').trim();
    var sel = $('#crew' + slot + 'sel');
    if (val === '') {
        slotMatches[slot] = [];
        sel.addClass('d-none').empty();
        return Promise.resolve();
    }
    if (!isNaN(val)) {
        // an id: look up its name so the legend can show the name, not the id
        return db.collection('crew').doc(val).get().then((doc)=>{
            var name = (doc.exists && doc.data() && doc.data().name) || val;
            slotMatches[slot] = [{ id: val, name: name }];
            sel.addClass('d-none').empty();
        }).catch(()=>{ slotMatches[slot] = [{ id: val, name: val }]; sel.addClass('d-none').empty(); });
    }
    // a name: equality query, which may return multiple crews sharing the name
    return db.collection('crew').where('name', '==', val).get().then((snap)=>{
        var matches = [];
        snap.forEach((d)=>matches.push({ id: d.id, name: (d.data().name || val) }));
        slotMatches[slot] = matches;
        if (matches.length > 1) {
            // let the user pick which id; swapping the option reloads the graph
            sel.empty();
            matches.forEach((m)=>sel.append('<option value="' + m.id + '">' + m.id + '</option>'));
            sel.removeClass('d-none');
        } else {
            sel.addClass('d-none').empty();
        }
    });
}

// Build crewState.crews from each slot's currently-selected candidate and
// (re)attach listeners. Called after resolution and on every dropdown change.
function ReloadCrews() {
    var crews = [];
    ['A', 'B'].forEach((slot)=>{
        var matches = slotMatches[slot] || [];
        if (matches.length === 0) return;
        var sel = $('#crew' + slot + 'sel');
        var id = (matches.length > 1 && !sel.hasClass('d-none')) ? sel.val() : matches[0].id;
        var m = matches.find((x)=>x.id === id) || matches[0];
        crews.push({ id: m.id, name: m.name, records: null });
    });
    crewState.crews = crews;
    AttachCrewListeners();
    syncCrewUrl();
}

// Keep the address bar in sync with the current crew view so it's bookmarkable:
// /crew?ours=<id>&theirs=<id>&day=<n>. Uses the RESOLVED ids (a name search
// collapses to its picked id), so the URL is stable. Also gates the Share button:
// enabled only when both crews are resolved (i.e. after a submit with two crews).
function syncCrewUrl() {
    var p = new URLSearchParams();
    if (crewState.crews[0]) p.set('ours', crewState.crews[0].id);
    if (crewState.crews[1]) p.set('theirs', crewState.crews[1].id);
    if (crewState.day) p.set('day', crewState.day);
    history.replaceState(null, '', '/crew?' + p.toString());
    $('#crewshare').prop('disabled', crewState.crews.length < 2);
}

// Copy the current (two-crew) URL to the clipboard, with brief button feedback.
function ShareCrewUrl() {
    navigator.clipboard.writeText(location.href).then(function () {
        var b = $('#crewshare'), t = b.text();
        b.text('Copied!');
        setTimeout(function () { b.text(t); }, 1200);
    });
}

// Called by the Day1-4 buttons: same crews/raid, just render a different day
// from the records we already hold - instant, no network round-trip.
function SelectDay(day) {
    crewState.day = day;
    $('#crewdays button').removeClass('active').eq(day - 1).addClass('active');
    RenderCrewChart();
    syncCrewUrl();
}

// Attach an onSnapshot listener per resolved crew. Each crew's records doc
// (crew/{id}/records/{raid}) holds every day's data points; a snapshot updates
// that crew's cache and re-renders the current day live.
function AttachCrewListeners() {
    unsubscribeCrew.forEach((u)=>u());
    unsubscribeCrew = [];
    RenderCrewChart(); // draw an empty frame immediately; snapshots fill it in
    crewState.crews.forEach((c)=>{
        c.records = null;
        var u = db.collection('crew').doc(c.id).collection('records').doc(crewState.raid)
            .onSnapshot((doc)=>{
                c.records = (doc.exists && doc.data() && doc.data()['records']) || [];
                console.log('crew snapshot:', c.id, crewState.raid, c.records.length, 'records', new Date().toISOString());
                RenderCrewChart();
            }, (err)=>console.error('crew listener error:', c.id, err));
        unsubscribeCrew.push(u);
    });
}

// Bucket a crew's records onto the day's 20-min grid, returning cumulative
// points per slot (null where no datapoint exists).
function CrewPointsOnGrid(crew, slots) {
    return slots.map((s)=>{
        var rec = (crew.records || []).find((e)=>{
            var t = new Date(e.datetime.seconds*1000);
            return t.between(s, s.addMinutes(20));
        });
        return rec ? rec.point : null;
    });
}

// Chart config for the crew view: a line chart on the left axis (speed, floored
// at 0) plus, when comparing two crews, a bar series on a right axis centered
// at 0 (the accumulated within-day lead). Kept separate from GraphConfig so the
// personal-border charts stay single-axis.
function CrewChartConfig(title, labels, datasets, diffBound) {
    var scales = { y: { position: 'left', beginAtZero: true } };
    if (diffBound != null) {
        var b = Math.max(diffBound, 1); // symmetric bounds keep 0 at the center
        scales.yDiff = { position: 'right', min: -b, max: b, grid: { drawOnChartArea: false } };
    }
    return {
        type: 'line',
        data: { labels: labels, datasets: datasets },
        options: {
            interaction: { intersect: false, mode: 'index' },
            plugins: { title: { display: true, text: title } },
            scales: scales
        }
    };
}

// Build the speed (20-min point delta) series for each crew on the selected day
// and draw/update the chart. Time axis is fixed 07:00-24:00 JST inclusive. With
// two crews, also draw the accumulated lead (crewA - crewB) as bars on a
// zero-centered right axis.
function RenderCrewChart() {
    var raid = crewState.raid, day = crewState.day;
    var slots = CreateTimeframe(raid, day);
    var labels = slots.map((e,i,a)=>(i == a.length-1 && e.toJstHM() == '00:00') ? '24:00' : e.toJstHM());
    var crewPoints = crewState.crews.map((c)=>CrewPointsOnGrid(c, slots));
    // crew speed lines on the left axis
    var datasets = crewState.crews.map((c,ci)=>({
        type: 'line',
        label: c.name || c.id,
        backgroundColor: colors[ci],
        borderColor: colors[ci],
        yAxisID: 'y',
        // speed = 20-min point delta; the 07:00 slot is anchored at 0
        // (no battling before 07:00, so nothing is earned into that slot)
        data: crewPoints[ci].map((v,j,a)=> j == 0 ? 0 : ((a[j]==null||a[j-1]==null) ? null : a[j]-a[j-1])),
        fill: false
    }));
    // accumulated within-day lead of crewA over crewB, as bars on the right axis
    var diffBound = null;
    if (crewState.crews.length === 2) {
        var A = crewPoints[0], B = crewPoints[1], baseA = A[0], baseB = B[0];
        // (A[j]-A[07:00]) - (B[j]-B[07:00]) => starts at 0, +ve when crewA leads
        var diff = A.map((v,j)=>(A[j]==null||B[j]==null||baseA==null||baseB==null) ? null
                                 : (A[j]-baseA) - (B[j]-baseB));
        diffBound = diff.reduce((m,v)=>(v==null ? m : Math.max(m, Math.abs(v))), 0);
        datasets.push({
            type: 'bar',
            label: 'lead: ' + (crewState.crews[0].name||crewState.crews[0].id) + ' - ' + (crewState.crews[1].name||crewState.crews[1].id),
            backgroundColor: 'rgba(54,162,235,0.35)',
            borderColor: 'rgba(54,162,235,0.8)',
            yAxisID: 'yDiff',
            order: 1, // draw bars behind the speed lines
            data: diff
        });
    }
    var title = raid + ' day ' + day + ' crew speed' + (diffBound != null ? ' (+ accumulated lead)' : '');
    // rebuild when the series count changes (1 line <-> 2 lines + diff bar);
    // otherwise swap data in place so legend toggles survive realtime updates
    if (crewdatadiff == null || crewdatadiff.data.datasets.length != datasets.length) {
        if (crewdatadiff != null) crewdatadiff.destroy();
        crewdatadiff = new Chart(
            $('#crew')[0].getContext('2d'),
            CrewChartConfig(title, labels, datasets, diffBound)
        );
    } else {
        crewdatadiff.data.labels = labels;
        datasets.forEach((d,i)=>{
            crewdatadiff.data.datasets[i].data = d.data;
            crewdatadiff.data.datasets[i].label = d.label;
        });
        if (diffBound != null) {
            var b = Math.max(diffBound, 1);
            crewdatadiff.options.scales.yDiff.min = -b;
            crewdatadiff.options.scales.yDiff.max = b;
        }
        crewdatadiff.options.plugins.title.text = title;
        crewdatadiff.update('none');
    }
}
</script>

<!-- Page init functions & event listerners -->
<script id="init-page">
    $('form').submit((e)=>e.preventDefault())
    var historicalData, db;
    $('.pborder').hide();
    $('.crewsearch').hide();
    document.addEventListener('DOMContentLoaded', function() {
        try {
            let app = firebase.app();
        } catch (e) {
            console.error(e);
        }
        db = firebase.firestore();
        //Generate Nav Bar Items from firebase data
        db.collection('configs').doc('history').get().then((doc) => {
            historicalData = Object.entries(doc.data()).reverse().reduce((a,c)=>{a[c[0]]=c[1]; return a}, {});
            app = new Vue({el: '#navbar', data: {
                history: historicalData,
                helpers: helpers,
            }})
            // Default raid derives from history dates now (public_config removed):
            // the newest raid whose prelim start (date[0]) is already in the past.
            var now = new Date()
            newestRaid = Object.keys(historicalData).find((k)=> new Date(historicalData[k].date[0].seconds*1000) <= now) || Object.keys(historicalData)[0]

            // Deep-link: /crew or ?ours=&theirs=(&day=) opens the crew view
            // pre-filled + auto-submitted, so a bookmarked URL needs no re-entry.
            var params = new URLSearchParams(location.search)
            var ours = params.get('ours'), theirs = params.get('theirs')
            if (ours != null || theirs != null || /\/crew\/?$/.test(location.pathname)) {
                if (ours != null) $('#crewA').val(ours)
                if (theirs != null) $('#crewB').val(theirs)
                $('.pborder').hide(); $('.crewsearch').show()
                var rd = CrewDefaultRaidDay()
                var d = parseInt(params.get('day'), 10)
                ShowCrewSearch(rd[0], (d >= 1 && d <= 5) ? d : rd[1])
            } else {
                today = Array.from({length:6},(x,i)=>[4-i,GetDateTimeInRaid(newestRaid,4-i)[0]]).find((e)=>(e[1]<now))
                helpers.LoadPersonalBorderGraph(newestRaid, today[0])
            }
        });
    });
</script>
